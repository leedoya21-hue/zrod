<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독립 예산 관리자</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainBody">

    <div class="card mini-card" id="totalBudgetCard" style="background: #202124; color: white; cursor: pointer;" onclick="expandTotalBudget()">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="totalBudgetSummary" style="font-size: 1rem; font-weight: bold;">
                🏛️ 예산: <span id="summaryAmount">0</span>원
            </div>
            <button id="collapseBtn" onclick="collapseTotalBudget(event)" class="btn-toggle" style="display: none; background: #8ab4f8; color: #202124;">접기</button>
        </div>
        <div id="totalBudgetDetails" style="display: none; margin-top: 10px; cursor: default;" onclick="event.stopPropagation()">
            <div style="font-size: 1.5rem; font-weight: 800; text-align: center; margin: 10px 0;">
                <span id="totalBudgetDisplay">0</span>원
            </div>
            <hr style="border-color: #3c4043;">
            <div class="input-group">
                <input type="number" id="distributeAmount" placeholder="배분 금액" style="background: #3c4043; color: white; border: none;">
                <button onclick="distributeMoney()" style="background: #8ab4f8; color: #202124; margin-top: 5px;">배분하기</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h2 style="margin: 0;">💰 분야별 잔액 관리</h2>
            <button onclick="openCategoryEditor()" style="width: 35px; height: 35px; border-radius: 50%; font-size: 1.5rem; background: #1a73e8; color: white; border: none; cursor: pointer;">+</button>
        </div>
        <div id="categoryList"></div>
    </div>

    <div class="card">
        <h2>💸 지출: <span id="selectedCategoryName" style="color: #1a73e8; font-weight: 800;">분야를 선택해주세요</span></h2>
        
        <div id="subCategoryContainer" style="margin-bottom: 10px; display: none;">
            <label style="font-size: 0.75rem; color: var(--sub-text);">세부 항목 선택</label>
            <select id="spendingSubCategory" style="margin-top: 4px; border: 2px solid var(--primary);"></select>
        </div>

        <div class="amount-control">
            <input type="number" id="spendingAmount" placeholder="금액 입력" inputmode="numeric" value="0">
            <button onclick="resetSpendingAmount()" class="btn-zero">0</button>
        </div>
        <div class="quick-buttons">
            <button onclick="adjustAmount(10000)">만</button>
            <button onclick="adjustAmount(1000)">천</button>
            <button onclick="adjustAmount(100)">백</button>
            <button onclick="adjustAmount(10)">십</button>
        </div>
        <button onclick="addSpending()" class="btn-confirm">지출 확정</button>
    </div>

    <div class="card">
        <h2>⚙️ 데이터 및 설정</h2>
        <button class="btn-outline" onclick="exportData()">데이터 백업</button>
        <button class="btn-outline" onclick="importData()">데이터 불러오기</button>
        <button class="btn-danger" onclick="resetAll()">전체 데이터 초기화</button>
    </div>

    <div id="categoryEditorUI" class="full-screen-modal"></div>
    <div id="logViewerUI" class="full-screen-modal"></div>
    <div id="subCategoryEditorUI" class="full-screen-modal"></div>

    <script src="script.js"></script>
    <script src="category-editor.js"></script>
</body>
</html>
